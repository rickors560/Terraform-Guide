{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "myapp.backend.fullname" . }}-secrets
  labels:
    {{- include "myapp.backend.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    # In production, use external-secrets-operator or sealed-secrets instead
    # of storing secrets directly in Helm values.
    # Example ExternalSecret reference:
    #   apiVersion: external-secrets.io/v1beta1
    #   kind: ExternalSecret
    #   spec:
    #     refreshInterval: 1h
    #     secretStoreRef:
    #       name: aws-secrets-manager
    #       kind: ClusterSecretStore
    #     target:
    #       name: {{ include "myapp.backend.fullname" . }}-secrets
    #     data:
    #       - secretKey: DB_URL
    #         remoteRef:
    #           key: myapp/database
    #           property: url
type: Opaque
data:
  {{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
