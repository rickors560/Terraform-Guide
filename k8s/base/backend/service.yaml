apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: myapp
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: backend
