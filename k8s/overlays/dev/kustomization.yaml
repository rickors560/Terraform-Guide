apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

namePrefix: dev-

commonLabels:
  environment: dev

resources:
  - ../../base

patches:
  - path: patches/deployment-backend.yaml
  - path: patches/deployment-frontend.yaml
  - path: patches/hpa-backend.yaml
  - path: patches/ingress.yaml

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=dev
      - LOGGING_LEVEL_ROOT=DEBUG
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,https://dev.myapp.example.com
