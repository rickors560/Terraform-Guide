apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

namePrefix: staging-

commonLabels:
  environment: staging

resources:
  - ../../base

patches:
  - path: patches/deployment-backend.yaml
  - path: patches/deployment-frontend.yaml
  - path: patches/ingress.yaml

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=staging
      - LOGGING_LEVEL_ROOT=INFO
      - APP_CORS_ALLOWED_ORIGINS=https://staging.myapp.example.com
