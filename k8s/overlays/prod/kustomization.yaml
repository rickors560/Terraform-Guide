apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

namePrefix: prod-

commonLabels:
  environment: production

resources:
  - ../../base

patches:
  - path: patches/deployment-backend.yaml
  - path: patches/deployment-frontend.yaml
  - path: patches/hpa-backend.yaml
  - path: patches/ingress.yaml

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=prod
      - LOGGING_LEVEL_ROOT=WARN
      - APP_CORS_ALLOWED_ORIGINS=https://myapp.example.com
