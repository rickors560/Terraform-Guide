###############################################################################
# Application Build & Deploy
#
# Triggered on pushes to main that touch files under application/.
# Builds backend (Maven) and frontend (npm), creates Docker images, pushes
# to ECR, deploys to EKS, runs smoke tests, and rolls back on failure.
###############################################################################
name: "Application Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - "application/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"
  ECR_REGISTRY: ""  # populated by login step
  BACKEND_IMAGE: "myapp-backend"
  FRONTEND_IMAGE: "myapp-frontend"
  EKS_CLUSTER_NAME: "myapp-cluster"
  K8S_NAMESPACE: "myapp"
  JAVA_VERSION: "17"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Build and test the backend (Spring Boot / Maven)
  # ---------------------------------------------------------------------------
  build-backend:
    name: "Build Backend"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Run unit tests
        working-directory: application/backend
        run: mvn test -B -q

      - name: Run integration tests
        working-directory: application/backend
        run: mvn verify -B -q -DskipUnitTests=true

      - name: Build JAR
        working-directory: application/backend
        run: mvn package -B -q -DskipTests

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend Docker image
        working-directory: application/backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build \
            --build-arg JAR_FILE=target/*.jar \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$BACKEND_IMAGE:latest" \
            .
          docker push "$ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$BACKEND_IMAGE:latest"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: application/backend/target/surefire-reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build and test the frontend (React / Vite / npm)
  # ---------------------------------------------------------------------------
  build-frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: application/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application/frontend
        run: npm ci

      - name: Run linter
        working-directory: application/frontend
        run: npm run lint

      - name: Run TypeScript check
        working-directory: application/frontend
        run: npm run type-check || npx tsc --noEmit

      - name: Run unit tests
        working-directory: application/frontend
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: Build production bundle
        working-directory: application/frontend
        run: npm run build

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend Docker image
        working-directory: application/frontend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$FRONTEND_IMAGE:latest" \
            .
          docker push "$ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$FRONTEND_IMAGE:latest"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: application/frontend/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Deploy to EKS
  # ---------------------------------------------------------------------------
  deploy:
    name: "Deploy to EKS"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: dev
    outputs:
      previous_backend_tag: ${{ steps.current.outputs.backend_tag }}
      previous_frontend_tag: ${{ steps.current.outputs.frontend_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION" \
            --alias "$EKS_CLUSTER_NAME"

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Record current deployment images (for rollback)
        id: current
        run: |
          CURRENT_BACKEND=$(kubectl get deployment backend \
            -n "$K8S_NAMESPACE" \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          CURRENT_FRONTEND=$(kubectl get deployment frontend \
            -n "$K8S_NAMESPACE" \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "backend_tag=$CURRENT_BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=$CURRENT_FRONTEND" >> "$GITHUB_OUTPUT"
          echo "Previous backend image: $CURRENT_BACKEND"
          echo "Previous frontend image: $CURRENT_FRONTEND"

      - name: Deploy backend via kubectl
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-backend.outputs.image_tag }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG"
          echo "Deploying backend image: $FULL_IMAGE"

          # Apply base manifests
          kubectl apply -k k8s/base/ --namespace "$K8S_NAMESPACE" || true

          # Update the image
          kubectl set image deployment/backend \
            backend="$FULL_IMAGE" \
            -n "$K8S_NAMESPACE"

          # Wait for rollout
          kubectl rollout status deployment/backend \
            -n "$K8S_NAMESPACE" \
            --timeout=300s

      - name: Deploy frontend via kubectl
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-frontend.outputs.image_tag }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG"
          echo "Deploying frontend image: $FULL_IMAGE"

          kubectl set image deployment/frontend \
            frontend="$FULL_IMAGE" \
            -n "$K8S_NAMESPACE"

          kubectl rollout status deployment/frontend \
            -n "$K8S_NAMESPACE" \
            --timeout=300s

      - name: Notify Slack on deploy success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: *Application deployed to EKS*\nBackend: `${{ needs.build-backend.outputs.image_tag }}`\nFrontend: `${{ needs.build-frontend.outputs.image_tag }}`\nCommit: `${{ github.sha }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Smoke tests
  # ---------------------------------------------------------------------------
  smoke-test:
    name: "Smoke Tests"
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Get application endpoints
        id: endpoints
        run: |
          # Get the ingress/service URL
          BACKEND_URL=$(kubectl get svc backend -n "$K8S_NAMESPACE" \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL=$(kubectl get ingress -n "$K8S_NAMESPACE" \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "localhost")
          fi
          echo "backend_url=http://$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        id: smoke
        env:
          BACKEND_URL: ${{ steps.endpoints.outputs.backend_url }}
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=10
          PASSED=true

          # Test 1: Backend health check
          echo "=== Test 1: Backend Health Check ==="
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "$BACKEND_URL/actuator/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/$MAX_RETRIES failed (HTTP $HTTP_CODE). Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "::error::Health check failed after $MAX_RETRIES attempts"
              PASSED=false
            fi
          done

          # Test 2: Backend API responds
          echo "=== Test 2: Backend API Response ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            "$BACKEND_URL/api/v1/health" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "API endpoint responded (HTTP $HTTP_CODE)"
          else
            echo "::warning::API endpoint returned HTTP $HTTP_CODE"
          fi

          # Test 3: Pods are running
          echo "=== Test 3: Pod Status ==="
          NOT_READY=$(kubectl get pods -n "$K8S_NAMESPACE" \
            --field-selector=status.phase!=Running \
            --no-headers 2>/dev/null | wc -l)
          if [ "$NOT_READY" -gt 0 ]; then
            echo "::error::$NOT_READY pods are not in Running state"
            kubectl get pods -n "$K8S_NAMESPACE"
            PASSED=false
          else
            echo "All pods are running"
          fi

          if [ "$PASSED" = "false" ]; then
            echo "smoke_passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "smoke_passed=true" >> "$GITHUB_OUTPUT"
          echo "All smoke tests passed."

  # ---------------------------------------------------------------------------
  # Rollback on failure
  # ---------------------------------------------------------------------------
  rollback:
    name: "Rollback on Failure"
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: failure() && needs.deploy.result == 'success'
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Rollback backend deployment
        run: |
          echo "Rolling back backend deployment..."
          kubectl rollout undo deployment/backend -n "$K8S_NAMESPACE"
          kubectl rollout status deployment/backend -n "$K8S_NAMESPACE" --timeout=300s
          echo "Backend rollback complete."

      - name: Rollback frontend deployment
        run: |
          echo "Rolling back frontend deployment..."
          kubectl rollout undo deployment/frontend -n "$K8S_NAMESPACE"
          kubectl rollout status deployment/frontend -n "$K8S_NAMESPACE" --timeout=300s
          echo "Frontend rollback complete."

      - name: Verify rollback
        run: |
          echo "Verifying rollback..."
          kubectl get pods -n "$K8S_NAMESPACE"
          kubectl get deployments -n "$K8S_NAMESPACE"

      - name: Notify Slack about rollback
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rotating_light: *Deployment rolled back*\nSmoke tests failed — previous version has been restored.\nCommit: `${{ github.sha }}`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
