###############################################################################
# PR Checks — Runs on pull requests that touch application/ files
#
# Backend:  Java lint, compile, unit tests, integration tests
# Frontend: ESLint, TypeScript check, unit tests, build
# Both:     Docker build test (no push)
###############################################################################
name: "PR Checks (Application)"

on:
  pull_request:
    branches: [main]
    paths:
      - "application/**"

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Detect which parts changed
  # ---------------------------------------------------------------------------
  changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'application/backend/**'
            frontend:
              - 'application/frontend/**'

  # ---------------------------------------------------------------------------
  # Backend checks
  # ---------------------------------------------------------------------------
  backend-lint:
    name: "Backend Lint & Compile"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Check code style with Checkstyle
        working-directory: application/backend
        run: |
          mvn checkstyle:check -B -q 2>&1 || {
            echo "::warning::Checkstyle plugin not configured; skipping lint."
          }

      - name: Compile
        working-directory: application/backend
        run: mvn compile -B -q

  backend-unit-tests:
    name: "Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Run unit tests
        working-directory: application/backend
        run: mvn test -B

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Backend Unit Test Results"
          path: application/backend/target/surefire-reports/*.xml
          reporter: java-junit
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-reports
          path: application/backend/target/surefire-reports/
          retention-days: 7

  backend-integration-tests:
    name: "Backend Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Run integration tests
        working-directory: application/backend
        run: mvn verify -B -DskipUnitTests=true

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Backend Integration Test Results"
          path: application/backend/target/failsafe-reports/*.xml
          reporter: java-junit
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Frontend checks
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: "Frontend Lint & Type Check"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: application/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: application/frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: application/frontend
        run: npm run type-check || npx tsc --noEmit

  frontend-unit-tests:
    name: "Frontend Unit Tests"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: application/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application/frontend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: application/frontend
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: application/frontend/coverage/
          retention-days: 7

  frontend-build:
    name: "Frontend Build"
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: application/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application/frontend
        run: npm ci

      - name: Build production bundle
        working-directory: application/frontend
        run: npm run build

      - name: Check bundle size
        working-directory: application/frontend
        run: |
          DIST_DIR="dist"
          if [ -d "$DIST_DIR" ]; then
            TOTAL_SIZE=$(du -sb "$DIST_DIR" | cut -f1)
            TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1048576" | bc)
            echo "Total bundle size: ${TOTAL_SIZE_MB} MB"
            # Warn if bundle exceeds 5 MB
            MAX_SIZE=5242880
            if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
              echo "::warning::Bundle size (${TOTAL_SIZE_MB} MB) exceeds 5 MB threshold"
            fi
          fi

  # ---------------------------------------------------------------------------
  # Docker build test (no push)
  # ---------------------------------------------------------------------------
  docker-build-backend:
    name: "Docker Build Test (Backend)"
    runs-on: ubuntu-latest
    needs: [backend-unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Build JAR
        working-directory: application/backend
        run: mvn package -B -q -DskipTests

      - name: Build Docker image (no push)
        working-directory: application/backend
        run: |
          docker build \
            --build-arg JAR_FILE=target/*.jar \
            -t myapp-backend:test \
            .
          echo "Backend Docker image built successfully"
          docker images myapp-backend:test

  docker-build-frontend:
    name: "Docker Build Test (Frontend)"
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        working-directory: application/frontend
        run: |
          docker build \
            -t myapp-frontend:test \
            .
          echo "Frontend Docker image built successfully"
          docker images myapp-frontend:test

  # ---------------------------------------------------------------------------
  # Summary gate
  # ---------------------------------------------------------------------------
  pr-checks-passed:
    name: "All PR Checks Passed"
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-unit-tests
      - backend-integration-tests
      - frontend-lint
      - frontend-unit-tests
      - frontend-build
      - docker-build-backend
      - docker-build-frontend
    if: always()
    steps:
      - name: Check results
        run: |
          RESULTS="${{ needs.backend-lint.result }} ${{ needs.backend-unit-tests.result }} \
          ${{ needs.backend-integration-tests.result }} ${{ needs.frontend-lint.result }} \
          ${{ needs.frontend-unit-tests.result }} ${{ needs.frontend-build.result }} \
          ${{ needs.docker-build-backend.result }} ${{ needs.docker-build-frontend.result }}"

          echo "Job results: $RESULTS"

          for result in $RESULTS; do
            if [ "$result" = "failure" ]; then
              echo "::error::One or more PR checks failed."
              exit 1
            fi
          done
          echo "All applicable PR checks passed."
